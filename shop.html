<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ばくショップ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🛒 ばくショップ</h1>
  <p>ログインした人だけが見られるページです</p>
</header>

<div class="cart">
  🛒 カート：<span id="cart-count">0</span>個<br>
  💴 合計：<span id="cart-total">0</span>円
</div>

<a href="cart.html" class="login-button">🛒 カートを見る</a>
<button onclick="resetCart()">🗑️ カートを空にする</button>

<div class="gallery">
  <div class="card">
    <img src="dog.jpg">
    <h3>ばくポストカード</h3>
    <p>¥300</p>
    <button onclick="addCart('ばくポストカード', 300)">カートに追加</button>
  </div>

  <div class="card">
    <img src="dog2.jpg">
    <h3>ばくステッカー</h3>
    <p>¥300</p>
    <button onclick="addCart('ばくステッカー', 300)">カートに追加</button>
  </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function updateCartDisplay() {
  let totalCount = 0;
  let totalPrice = 0;

  cart.forEach(item => {
    totalCount += item.quantity;
    totalPrice += item.price * item.quantity;
  });

  document.getElementById("cart-count").textContent = totalCount;
  document.getElementById("cart-total").textContent = totalPrice;
}

function addCart(name, price) {
  const existingItem = cart.find(item => item.name === name);

  if (existingItem) {
    existingItem.quantity++;
  } else {
    cart.push({
      name: name,
      price: price,
      quantity: 1
    });
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartDisplay();
  alert(name + "をカートに追加しました！");
}

function resetCart() {
  if (confirm("カートを空にしますか？")) {
    cart = [];
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartDisplay();
  }
}

updateCartDisplay();
</script>

</body>
</html>
