<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カートの中身</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🛒 カートの中身</h1>
  <p>現在のカート状況</p>
</header>

<div class="cart">
  カートの商品数：<span id="cart-count">0</span>個
</div>

<a href="shop.html" class="login-button">
  ← ショップに戻る
</a>

<script>
let cartCount = localStorage.getItem("cartCount");

if (cartCount === null) {
  cartCount = 0;
} else {
  cartCount = Number(cartCount);
}

document.getElementById("cart-count").textContent = cartCount;
</script>

</body>
</html>
