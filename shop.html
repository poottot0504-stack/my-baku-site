<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ばくショップ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🛒 ばくショップ</h1>
  <p>ログインした人だけが見られるページです</p>
</header>

<div class="cart">
  🛒 カート：<span id="cart-count">0</span>個<br>
  💴 合計：<span id="cart-total">0</span>円
</div>

<a href="cart.html" class="login-button">🛒 カートを見る</a>
<button onclick="resetCart()">🗑️ カートを空にする</button>

<div class="gallery" id="product-list"></div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function updateCartDisplay() {
  let totalCount = 0;
  let totalPrice = 0;

  cart.forEach(item => {
    totalCount += item.quantity;
    totalPrice += item.price * item.quantity;
  });

  document.getElementById("cart-count").textContent = totalCount;
  document.getElementById("cart-total").textContent = totalPrice;
}

function addCart(name, price) {
  const existingItem = cart.find(item => item.name === name);

  if (existingItem) {
    existingItem.quantity++;
  } else {
    cart.push({
      name: name,
      price: price,
      quantity: 1
    });
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartDisplay();
  alert(name + "をカートに追加しました！");
}

function resetCart() {
  if (confirm("カートを空にしますか？")) {
    cart = [];
    localStorage.setItem("cart", JSON.stringify(cart));
    updateCartDisplay();
  }
}

fetch("products.json")
  .then(response => response.json())
  .then(products => {
    const productList = document.getElementById("product-list");

    products.forEach(product => {
      productList.innerHTML += `
        <div class="card">
          <img src="${product.image}">
          <h3>${product.name}</h3>
          <p>¥${product.price}</p>
          <button onclick="addCart('${product.name}', ${product.price})">
            カートに追加
          </button>
        </div>
      `;
    });
  });

updateCartDisplay();
</script>
<div class="cart">
  ようこそ <span id="welcome-user"></span> さん
</div>

</body>
</html>
