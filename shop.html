<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ばくショップ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🛒 ばくショップ</h1>
  <p>ログインした人だけが見られるページです</p>
</header>

<div class="gallery">
  <div class="card">
    <img src="dog.jpg">
    <h3>ばくポストカード</h3>
    <p>¥300</p>
    <button onclick="addCart()">カートに追加</button>
  </div>

  <div class="card">
    <img src="dog2.jpg">
    <h3>ばくステッカー</h3>
    <p>¥300</p>
    <button onclick="addCart()">カートに追加</button>
  </div>
</div>
<div class="cart">
  🛒 カート：<span id="cart-count">0</span>個
</div>
<script>
let cartCount = 0;

function addCart() {
  cartCount++;
  document.getElementById("cart-count").textContent = cartCount;
  alert("カートに追加しました！");
}
</script>

</body>
</html>
