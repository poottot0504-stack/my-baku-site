<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ばくの成長日記</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<a href="login.html" class="login-button">ショップへログイン</a>

<header>
  <h1>🐶 ばくの成長日記 🐶</h1>
  <p>毎日のかわいい瞬間を記録しています</p>
</header>

<div class="gallery">

  <div class="card">
    <video controls playsinline muted loop>
      <source src="dog.mp4" type="video/mp4">
    </video>
    <h3>元気に遊ぶ</h3>
    <button onclick="likePost('dog1')">
      <span id="heart-dog1">🤍</span>
      いいね <span id="like-dog1">0</span>
    </button>
  </div>

  <div class="card">
    <video controls playsinline muted loop>
      <source src="dog2.mp4" type="video/mp4">
    </video>
    <h3>ひまわり王子おねむ。。。</h3>
    <button onclick="likePost('dog2')">
      <span id="heart-dog2">🤍</span>
      いいね <span id="like-dog2">0</span>
    </button>
  </div>

  <div class="card">
    <img src="dog.jpg" alt="今年初の桜">
    <h3>初の桜🌸</h3>
    <button onclick="likePost('dog3')">
      <span id="heart-dog3">🤍</span>
      いいね <span id="like-dog3">0</span>
    </button>
  </div>

  <div class="card">
    <img src="dog2.jpg" alt="羊とすやすや">
    <h3>羊とすやすや・・・</h3>
    <button onclick="likePost('dog4')">
      <span id="heart-dog4">🤍</span>
      いいね <span id="like-dog4">0</span>
    </button>
  </div>

</div>

<div class="cart">
  👀 訪問回数：<span id="visit-count">0</span>回
</div>

<script>
let visits = Number(localStorage.getItem("visits")) || 0;

visits++;

localStorage.setItem("visits", visits);

document.getElementById("visit-count").textContent = visits;

function likePost(id) {
  let liked = localStorage.getItem(id + "-liked");
  let count = Number(localStorage.getItem(id)) || 0;

  if (liked === "true") {
    count--;
    localStorage.setItem(id + "-liked", "false");
  } else {
    count++;
    localStorage.setItem(id + "-liked", "true");
  }

  if (count < 0) {
    count = 0;
  }

  localStorage.setItem(id, count);

  document.getElementById("like-" + id).textContent = count;

  const heart = document.getElementById("heart-" + id);
  if (heart) {
    heart.textContent = localStorage.getItem(id + "-liked") === "true" ? "❤️" : "🤍";
  }
}

function showLikes() {
  const ids = ["dog1", "dog2", "dog3", "dog4"];

  ids.forEach(id => {
    const count = Number(localStorage.getItem(id)) || 0;
    const liked = localStorage.getItem(id + "-liked") === "true";

    const likeTarget = document.getElementById("like-" + id);
    const heartTarget = document.getElementById("heart-" + id);

    if (likeTarget) {
      likeTarget.textContent = count;
    }

    if (heartTarget) {
      heartTarget.textContent = liked ? "❤️" : "🤍";
    }
  });
}

showLikes();
</script>

</body>
</html>
