<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>カートの中身</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🛒 カートの中身</h1>
  <p>選んだ商品を確認できます</p>
</header>

<div class="cart">
  <div id="cart-items"></div>
  <hr>
  <p>合計個数：<span id="cart-count">0</span>個</p>
  <p>合計金額：<span id="cart-total">0</span>円</p>
</div>

<a href="shop.html" class="login-button">← ショップに戻る</a>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function showCart() {
  const cartItems = document.getElementById("cart-items");
  let totalCount = 0;
  let totalPrice = 0;

  cartItems.innerHTML = "";

  if (cart.length === 0) {
    cartItems.innerHTML = "<p>カートは空です。</p>";
  }

  cart.forEach(item => {
    totalCount += item.quantity;
    totalPrice += item.price * item.quantity;

    cartItems.innerHTML += `
      <p>
        ${item.name} × ${item.quantity}
        （${item.price * item.quantity}円）
      </p>
    `;
  });

  document.getElementById("cart-count").textContent = totalCount;
  document.getElementById("cart-total").textContent = totalPrice;
}

showCart();
</script>

</body>
</html>
